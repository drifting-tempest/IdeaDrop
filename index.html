<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idea Drop</title>
    <link rel="stylesheet" href="./style.css">
</head>


<body>

    <div class="all-content">
        <div class="abt-me">
            <h1> What even is Idea Drop?</h1>
            <p> Idea Drop is YOUR solution to get rid of writer's block (or even creative block)! Click the "Drop an idea!" button to generate a random color and a random word to get your creative juices flowing :D </p>
        </div>

        <div class="color-name"></div> <!-- i put this outside the generator div because i wanted it to appear above color-gen div -->

        <div class="generator">
            <div class="gen-btn">
                Drop an idea!
            </div>

            <div class="gen-content">

                <div class="color-gen"></div>

                <div class="word-gen"></div>

            </div>
        </div>
    </div>

<script src="./script.js"></script>
</body>

</html>
